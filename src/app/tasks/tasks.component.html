@if(isAddingTask){
    <app-new-task [userId]="userId" (cancel)="onCancel()"/>
}
<section>
    <header>
        <h2>{{ name }}'s Tasks</h2>
        <menu>
            <button (click)="onAddTask()">Add Task</button>
        </menu>
    </header>
    <ul>
        @for (task of userTasks; track task.id) {
            <li>
                <app-task [task]="task"></app-task>
            </li>
        }
    </ul>
</section>

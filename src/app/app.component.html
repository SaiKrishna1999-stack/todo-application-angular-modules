<app-header/>
<main>
<ul id="users">
  @for (user of users; track user.id){
    <li>
      <app-user [user]="user" [selected]="user.id == userId" (select)="onUserSelect($event)"/>
    </li>
  }
</ul>
@if(userId){
  <app-tasks [name]="userName" [userId]="userId"/>
}
@else{
  <p>Please select a user, to view their tasks.</p>
}
</main>
